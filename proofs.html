        h1 {

            margin: 0; 
            font-size: 1.8em; 
            border-bottom: 2px solid #2c3e50; 
            padding-bottom: 10px;
        }

        .pdf-container { 
            width: 100%; 
            height: 800px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);

        /* Navigation Styling */

            text-align: right; 
            margin-bottom: 30px;

        nav a {

        }

        }
        nav a.active { color: #2c3e50; }
        nav a.inactive { color: #2980b9; }
        nav a:hover { text-decoration: underline; }

        /* Dropdown Styling - Fixed Hover Area Bridge */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: transparent; 
            min-width: 250px;
            z-index: 1000;
            padding-top: 15px; 
            margin-top: -5px; 
            text-align: left;
        }

        .dropdown-items {
            background-color: #fff;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.1);
            border-radius: 5px;
            border: 1px solid #ddd;
            overflow: hidden;
        }

        .dropdown-content a {
            color: #2980b9 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            margin-right: 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #eee;
        }

        .dropdown-content a:last-child { border-bottom: none; }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
            text-decoration: none !important;
            color: #2c3e50 !important;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown .fa-chevron-down {
            font-size: 0.7em;
            margin-left: 5px;
        }
        
    </style>
